<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Eventos</title>
    <link rel="stylesheet" href="/css/estilo.css" />
    <script src="/js/vue.min.js"></script>
  </head>
  <body class="exercicio">
    <div id="app">
      <p>Contador: {{contador}}</p>
      <p>
        <button v-on:click="add">+1 com v-on:click</button>
        <button @click="add">+1 com @click</button>
      </p>
      <p><button @click="contador -= 2">-2 inline</button></p>
      <p @mousemove="atualizarPosicao">
        Coordenadas: {{x}} e {{y}}
        <span @mousemove.stop>@mousemove.stop </span>
        <span @mousemove="stopPropagation">@mousemove="stopPropagation"</span>
        <input type="text" @keyup.enter="alerta" />
      </p>
      <!--quando for clicado invoca o método add-->
    </div>
    <script>
      new Vue({
        el: "#app",
        data: {
          x: 0,
          y: 0,
          contador: 0,
        },
        methods: {
          add() {
            this.contador++;
          },
          atualizarPosicao(e) {
            this.x = e.clientX;
            this.y = e.clientY;
          },
          stopPropagation(e) {
            e.stopPropagation();
          },
          alerta() {
            alert("Enter!");
          },
        },
      });
    </script>
  </body>
</html>
